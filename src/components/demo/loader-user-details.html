<div style="display: grid; gap: 1rem;">
  <!-- Contact Section -->
  <div style="padding: 1rem; background: var(--ui-surface-2, #f5f5f5); border-radius: var(--ui-radius, 8px);">
    <div style="display: grid; gap: 0.75rem;">
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Email</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{email}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Phone</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{phone}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Website</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;"><a href="https://{{website}}" target="_blank" style="color: var(--ui-primary, #0066cc); text-decoration: none;">{{website}}</a></div>
      </div>
    </div>
  </div>

  <!-- Username Section -->
  <div style="padding: 1rem; background: var(--ui-surface-2, #f5f5f5); border-radius: var(--ui-radius, 8px);">
    <div>
      <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Username</div>
      <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{username}}</div>
    </div>
  </div>

  <!-- Address Section -->
  <div style="padding: 1rem; background: var(--ui-surface-2, #f5f5f5); border-radius: var(--ui-radius, 8px);">
    <div style="display: grid; gap: 0.75rem;">
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Street Address</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{street}}, {{suite}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">City &amp; Zip</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{city}}, {{zipcode}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Coordinates</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">Latitude: {{lat}} | Longitude: {{lng}}</div>
      </div>
    </div>
  </div>

  <!-- Company Section -->
  <div style="padding: 1rem; background: var(--ui-surface-2, #f5f5f5); border-radius: var(--ui-radius, 8px);">
    <div style="display: grid; gap: 0.75rem;">
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Company Name</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{company_name}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Catch Phrase</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5; font-style: italic;">{{catch_phrase}}</div>
      </div>
      <div>
        <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">Business Focus</div>
        <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{bs}}</div>
      </div>
    </div>
  </div>

  <!-- ID Section -->
  <div style="padding: 1rem; background: var(--ui-surface-2, #f5f5f5); border-radius: var(--ui-radius, 8px);">
    <div>
      <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ui-fg-muted, #999); margin-bottom: 0.35rem;">User ID</div>
      <div style="color: var(--ui-fg, #1a1a1a); line-height: 1.5;">{{id}}</div>
    </div>
  </div>
</div>
