<div style="display: grid; gap: 1rem;">
  <div>
    <strong>Email</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{email}}</p>
  </div>
  <div>
    <strong>Username</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{username}}</p>
  </div>
  <div>
    <strong>Phone</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{phone}}</p>
  </div>
  <div>
    <strong>Website</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{website}}</p>
  </div>
  <div>
    <strong>Company</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{company}}</p>
  </div>
  <div>
    <strong>Address</strong>
    <p style="margin: 0.5rem 0 0; color: var(--ui-fg-muted, #6f6f6f);">{{street}}<br>{{city}} {{zipcode}}</p>
  </div>
</div>
